# Low-cost single-host layout: API + MySQL 8 + Redis (+ optional Caddy on VPS).
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: bidzone
      MYSQL_USER: bidzone
      MYSQL_PASSWORD: bidzone
      MYSQL_ROOT_PASSWORD: bidzone_root
    # Host 3307 avoids conflict with a local Windows MySQL on 3306. Inside compose, api still uses db:3306.
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pbidzone_root"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s

  api:
    build: .
    environment:
      DATABASE_URL_SYNC: mysql+pymysql://bidzone:bidzone@db:3306/bidzone?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  mysqldata:
